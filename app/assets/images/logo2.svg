<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Círculo com livro dentro -->
  <circle cx="80" cy="100" r="60" fill="#4a86e8" />
  
  <!-- Ícone de livro dentro do círculo -->
  <g fill="white">
    <!-- Corpo do livro -->
    <rect x="50" y="70" width="60" height="80" rx="2" ry="2" />
    
    <!-- Lombada do livro -->
    <path d="M50,70 Q40,75 40,80 L40,140 Q40,145 50,150 L50,70" />
    
    <!-- Linhas representando páginas -->
    <line x1="60" y1="85" x2="100" y2="85" stroke="white" stroke-width="2" />
    <line x1="60" y1="100" x2="100" y2="100" stroke="white" stroke-width="2" />
    <line x1="60" y1="115" x2="100" y2="115" stroke="white" stroke-width="2" />
    <line x1="60" y1="130" x2="100" y2="130" stroke="white" stroke-width="2" />
  </g>
  
  <!-- Texto "Virtual Bookshelf" -->
  <text x="160" y="110" font-family="Consolas, sans-serif" font-size="36" font-weight="bold" fill="#333333">
    Virtual Bookshelf
  </text>
</svg>